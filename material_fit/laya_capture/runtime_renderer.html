<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Material Fit Runtime Renderer</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  </style>
</head>
<body>
<script>
(async function bootstrap() {
  const params = new URLSearchParams(location.search);
  const engineRoot = params.get("engineRoot") || "";
  const projectRoot = params.get("projectRoot") || "";
  const sceneUrl = params.get("scene") || "";
  const environmentSceneUrl = params.get("environmentScene") || "";
  const assetManifestUrl = params.get("assetManifest") || "";
  const assetProfileUrl = params.get("assetProfile") || "";
  const serverBaseUrl = params.get("server") || "http://127.0.0.1:8787";
  const width = Number(params.get("width") || "320");
  const height = Number(params.get("height") || "240");
  const startupDebugMaterial = params.get("debugMaterial") === "1" || params.get("debugMaterial") === "true";
  const allowFallbackScene = params.get("allowFallbackScene") === "1" || params.get("allowFallbackScene") === "true";
  const assetProfile = await loadAssetProfile();
  const runtimeProfile = assetProfile && assetProfile.runtime && typeof assetProfile.runtime === "object"
    ? assetProfile.runtime
    : {};
  const captureDefaults = assetProfile && assetProfile.capture_defaults && typeof assetProfile.capture_defaults === "object"
    ? assetProfile.capture_defaults
    : {};

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = src;
      script.onload = resolve;
      script.onerror = () => reject(new Error("script load failed: " + src));
      document.head.appendChild(script);
    });
  }

  function joinUrl(root, path) {
    if (!root) return path;
    return root.replace(/\/$/, "") + "/" + path.replace(/^\//, "");
  }

  async function loadAssetProfile() {
    if (!assetProfileUrl) return {};
    const response = await fetch(assetProfileUrl, { cache: "no-store" });
    if (!response.ok) throw new Error("asset profile load failed: " + response.status);
    const profile = await response.json();
    if (!profile || typeof profile !== "object" || Array.isArray(profile)) {
      throw new Error("asset profile must be a JSON object");
    }
    return profile;
  }

  await loadScript(joinUrl(engineRoot, "laya.core.js"));
  await loadScript(joinUrl(engineRoot, "laya.webgl_2D.js"));
  await loadScript(joinUrl(engineRoot, "laya.d3.js"));
  await loadScript(joinUrl(engineRoot, "laya.webgl_3D.js"));
  await loadOptionalEngineScripts([
    "laya.ani.js",
    "laya.particleCommon.js",
    "laya.particle3D.js",
    "laya.trailCommon.js",
    "laya.trail3D.js",
  ]);

  const initResult = Laya.init(width, height);
  if (initResult && typeof initResult.then === "function") {
    await initResult;
  }
  Laya.stage.bgColor = colorToCss(runtimeProfile.background_color, "#000000");
  if (Laya.stage.scaleMode !== undefined) {
    Laya.stage.scaleMode = "noscale";
  }

  let lastNonce = "";
  let busy = false;
  let lastColor = [0.2, 0.6, 1.0, 1.0];
  const referencePixelCache = new Map();
  const referenceV2FeatureCache = new WeakMap();
  const referenceV4FeatureCache = new WeakMap();
  const silhouetteAlphaCache = new Map();
  let scoreReadbackCanvas = null;
  let scoreReadbackContext = null;
  let animatorDiscoveryLogged = false;
  const FIXED_ANIMATION_SAMPLE_SPEED = 1e-6;

  // The profile-driven renderer owns capture and pose control. Project capture
  // scripts must not apply historical animation presets during scene loading.
  globalThis.__MATERIAL_FIT_HEADLESS_RUNTIME__ = true;
  await loadProjectBundles();
  await installAssetManifest();
  const runtime = await createRuntimeScene();

  async function loadProjectBundles() {
    if (!projectRoot) return;
    for (const bundle of ["bin/js/bundles/bundle.js"]) {
      try {
        await loadScript(joinUrl(projectRoot, bundle));
        console.log("[material-fit] loaded project bundle: " + bundle);
      } catch (error) {
        console.warn("[material-fit] optional project bundle not loaded: " + bundle + " " + error);
      }
    }
  }

  async function loadOptionalEngineScripts(names) {
    for (const name of names) {
      try {
        await loadScript(joinUrl(engineRoot, name));
        console.log("[material-fit] loaded optional engine script: " + name);
      } catch (error) {
        console.warn("[material-fit] optional engine script not loaded: " + name);
      }
    }
  }

  async function installAssetManifest() {
    if (!assetManifestUrl || !Laya.AssetDb || !Laya.AssetDb.inst) return;
    const response = await fetch(assetManifestUrl);
    if (!response.ok) {
      console.warn("[material-fit] asset manifest not loaded: " + response.status);
      return;
    }
    const manifest = await response.json();
    const uuidMap = manifest && manifest.uuidMap || {};
    const shaderNameMap = manifest && manifest.shaderNameMap || {};
    const originalResolve = Laya.AssetDb.inst.resolveURL.bind(Laya.AssetDb.inst);
    if (Laya.LayaEnv) {
      Laya.LayaEnv.isPreview = true;
    }
    Laya.AssetDb.inst.uuidMap = Object.assign({}, Laya.AssetDb.inst.uuidMap || {}, uuidMap);
    Laya.AssetDb.inst.shaderNameMap = Object.assign({}, Laya.AssetDb.inst.shaderNameMap || {}, shaderNameMap);
    Laya.AssetDb.inst.UUID_to_URL = (uuid) => uuidMap[uuid] || null;
    Laya.AssetDb.inst.UUID_to_URL_async = (uuid) => Promise.resolve(uuidMap[uuid] || null);
    Laya.AssetDb.inst.shaderName_to_URL = (shaderName) => shaderNameMap[shaderName] || null;
    Laya.AssetDb.inst.shaderName_to_URL_async = (shaderName) => Promise.resolve(shaderNameMap[shaderName] || null);
    Laya.AssetDb.inst.resolveURL = (url, onResolve) => {
      if (url && url.startsWith("res://")) {
        const resolved = uuidMap[url.substring(6)] || null;
        if (onResolve) onResolve(resolved);
        return Promise.resolve(resolved);
      }
      return originalResolve(url, onResolve);
    };
    console.log("[material-fit] installed asset manifest entries=" + Object.keys(uuidMap).length + " shaders=" + Object.keys(shaderNameMap).length);
  }

  async function createRuntimeScene() {
    if (sceneUrl) {
      try {
        if (/\.lh(?:$|\?)/i.test(sceneUrl)) {
          return await createPrefabRuntimeScene(sceneUrl);
        }
        const scene = await Laya.Scene.open(sceneUrl, false);
        const sceneRoot = scene.scene3D || scene;
        // Disable serialized animators as soon as the hierarchy is available.
        // Waiting through startup settle frames first makes the captured
        // "startup" pose depend on browser/frame timing.
        prepareStartupAnimators(sceneRoot);
        ensureRuntimeMaterialCompatibility(sceneRoot);
        await waitFrames(4);
        ensureRuntimeMaterialCompatibility(sceneRoot);
        const camera = findFirstCamera(sceneRoot) || findNodeByName(sceneRoot, "Capture Camera");
        const target = findNodeByName(sceneRoot, runtimeProfile.target_name || "model");
        if (!camera || !target) {
          throw new Error(`scene loaded but camera/target missing camera=${!!camera} target=${!!target}`);
        }
        console.log("[material-fit] loaded scene: " + sceneUrl);
        applySceneProfile(sceneRoot, camera);
        // Catch animators introduced by startup scripts while retaining the
        // already-frozen serialized pose.
        prepareStartupAnimators(target);
        const frame = frameCamera(camera, target, runtimeProfile.camera);
        return buildRuntimeState("scene", sceneRoot, camera, target, null, frame);
      } catch (error) {
        const message = "[material-fit] scene load failed: " + (error && error.stack || error);
        console.error(message);
        if (!allowFallbackScene) {
          window.__MATERIAL_FIT_READY__ = { ok: false, error: message };
          throw error;
        }
        console.warn("[material-fit] allowFallbackScene enabled; falling back to cube");
      }
    }

    const scene = new Laya.Scene3D();
    Laya.stage.addChild(scene);
    const camera = new Laya.Camera(0, 0.1, 100);
    scene.addChild(camera);
    camera.transform.position = new Laya.Vector3(0, 0, 4);
    camera.transform.lookAt(new Laya.Vector3(0, 0, 0), new Laya.Vector3(0, 1, 0));
    const target = new Laya.MeshSprite3D(Laya.PrimitiveMesh.createBox(1.4, 1.4, 1.4));
    target.name = "model";
    scene.addChild(target);
    const fallbackMaterial = new Laya.UnlitMaterial();
    fallbackMaterial.albedoColor = new Laya.Color(lastColor[0], lastColor[1], lastColor[2], lastColor[3]);
    target.meshRenderer.material = fallbackMaterial;
    console.log("[material-fit] using fallback cube renderer");
    const frame = frameCamera(camera, target, runtimeProfile.camera);
    return buildRuntimeState("fallback_cube", scene, camera, target, fallbackMaterial, frame);
  }

  async function createPrefabRuntimeScene(prefabUrl) {
    const environment = await createRuntimeEnvironment();
    const scene = environment.scene;
    const camera = environment.camera;
    let prefab = await Laya.loader.load(prefabUrl);
    prefab = normalizeLoadedResource(prefabUrl, prefab);
    if (!prefab) {
      throw new Error("prefab load returned empty: " + prefabUrl);
    }
    console.log("[material-fit] prefab resource type: " + resourceTypeName(prefab));
    scene.addChild(prefab);
    prepareStartupAnimators(prefab);
    ensureRuntimeMaterialCompatibility(prefab);
    if (startupDebugMaterial) {
      applyDebugMaterials(prefab);
    }
    await waitFrames(runtimeProfile.startup_settle_frames == null ? 8 : runtimeProfile.startup_settle_frames);
    const target = findNodeByName(prefab, runtimeProfile.target_name || "model") || prefab;
    applySceneProfile(scene, camera);
    const frame = frameCamera(camera, target, runtimeProfile.camera);
    console.log("[material-fit] loaded prefab: " + prefabUrl);
    return buildRuntimeState("prefab", scene, camera, target, null, frame);
  }

  async function createRuntimeEnvironment() {
    if (environmentSceneUrl) {
      const opened = await Laya.Scene.open(environmentSceneUrl, false);
      const scene = opened && (opened.scene3D || findFirstScene3D(opened) || opened);
      const camera = findFirstCamera(scene) || findNodeByName(scene, "Main Camera");
      if (!scene || !camera) {
        throw new Error(`environment scene missing Scene3D/camera: ${environmentSceneUrl}`);
      }
      console.log("[material-fit] loaded runtime environment: " + environmentSceneUrl);
      return { scene, camera };
    }
    const scene = new Laya.Scene3D();
    Laya.stage.addChild(scene);
    const camera = new Laya.Camera(0, 0.1, 100);
    camera.name = "Capture Camera";
    scene.addChild(camera);
    addProfileLights(scene);
    return { scene, camera };
  }

  function findFirstScene3D(root) {
    if (!root) return null;
    if (root instanceof Laya.Scene3D) return root;
    for (const child of childNodes(root)) {
      const found = findFirstScene3D(child);
      if (found) return found;
    }
    return null;
  }

  function buildRuntimeState(mode, scene, camera, target, fallbackMaterial, frame) {
    const materialTarget = findNodeByName(target, runtimeProfile.material_target_name || "") || target;
    const initialTargetEuler = cloneVector3(target && target.transform && target.transform.localRotationEuler);
    return { mode, scene, camera, target, materialTarget, fallbackMaterial, frame, initialTargetEuler };
  }

  function cloneVector3(value) {
    return new Laya.Vector3(
      numberOr(value && value.x, 0),
      numberOr(value && value.y, 0),
      numberOr(value && value.z, 0),
    );
  }

  function normalizeLoadedResource(url, resource) {
    let value = resource;
    if (Array.isArray(value)) value = value[0];
    if (value && typeof value._setParent === "function") return value;
    const cached = Laya.loader && typeof Laya.loader.getRes === "function" ? Laya.loader.getRes(url) : null;
    if (Array.isArray(cached)) value = cached[0];
    else if (cached) value = cached;
    if (value && typeof value._setParent === "function") return value;
    if (value && typeof value.create === "function") return value.create();
    return value;
  }

  function resourceTypeName(value) {
    if (!value) return "null";
    const ctor = value.constructor && value.constructor.name || typeof value;
    return ctor + " keys=" + Object.keys(value).slice(0, 8).join(",");
  }

  function frameCamera(camera, target, cameraProfile) {
    const profile = cameraProfile && typeof cameraProfile === "object" ? cameraProfile : {};
    const configuredCenter = profile.center;
    const center = Array.isArray(configuredCenter) && configuredCenter.length >= 3
      ? new Laya.Vector3(numberOr(configuredCenter[0], 0), numberOr(configuredCenter[1], 0), numberOr(configuredCenter[2], 0))
      : new Laya.Vector3(0, 0, 0);
    const extent = new Laya.Vector3(2, 2, 2);
    const bounds = aggregateBounds(target);
    if (bounds) {
      center.x = bounds.center.x;
      center.y = bounds.center.y;
      center.z = bounds.center.z;
      extent.x = bounds.extent.x;
      extent.y = bounds.extent.y;
      extent.z = bounds.extent.z;
    }
    const radius = numberOr(profile.distance, Math.max(1, extent.x, extent.y, extent.z) * 2.4);
    const yawRad = numberOr(profile.yaw, 0) * Math.PI / 180;
    const pitchRad = numberOr(profile.pitch, 0) * Math.PI / 180;
    const cosPitch = Math.cos(pitchRad);
    camera.transform.position = new Laya.Vector3(
      center.x + Math.sin(yawRad) * cosPitch * radius,
      center.y + Math.sin(pitchRad) * radius + numberOr(profile.height_offset, radius * 0.15),
      center.z + Math.cos(yawRad) * cosPitch * radius,
    );
    camera.transform.lookAt(center, new Laya.Vector3(0, 1, 0));
    if ("orthographic" in camera) {
      camera.orthographic = profile.orthographic == null ? true : profile.orthographic === true;
      camera.orthographicVerticalSize = numberOr(
        profile.orthographic_vertical_size,
        Math.max(2, Math.max(extent.x, extent.y) * 3.1),
      );
    }
    if (Number.isFinite(Number(profile.field_of_view))) camera.fieldOfView = Number(profile.field_of_view);
    return { center, extent, radius };
  }

  function aggregateBounds(root) {
    let minX = Infinity;
    let minY = Infinity;
    let minZ = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;
    let maxZ = -Infinity;
    walk(root, (node) => {
      const renderer = node.meshRenderer || node.skinnedMeshRenderer || node.renderer || node._renderNode;
      if (!renderer) return;
      let parts = boundsCenterExtent(renderer.bounds || renderer._bounds);
      if (!parts) {
        parts = boundsCenterExtent(renderer.localBounds || renderer._localBounds);
        if (parts) parts = transformLocalBounds(parts, node.transform);
      }
      if (!parts) return;
      const { center, extent } = parts;
      minX = Math.min(minX, center.x - extent.x);
      minY = Math.min(minY, center.y - extent.y);
      minZ = Math.min(minZ, center.z - extent.z);
      maxX = Math.max(maxX, center.x + extent.x);
      maxY = Math.max(maxY, center.y + extent.y);
      maxZ = Math.max(maxZ, center.z + extent.z);
    });
    if (!Number.isFinite(minX)) return null;
    return {
      center: new Laya.Vector3((minX + maxX) / 2, (minY + maxY) / 2, (minZ + maxZ) / 2),
      extent: new Laya.Vector3((maxX - minX) / 2, (maxY - minY) / 2, (maxZ - minZ) / 2),
    };
  }

  function boundsCenterExtent(bounds) {
    if (!bounds) return null;
    let center = bounds.center || (typeof bounds.getCenter === "function" ? bounds.getCenter() : null);
    let extent = bounds.extents || bounds.extent || (typeof bounds.getExtent === "function" ? bounds.getExtent() : null);
    if (center && extent) return { center, extent };
    const min = bounds.min || (typeof bounds.getMin === "function" ? bounds.getMin() : null);
    const max = bounds.max || (typeof bounds.getMax === "function" ? bounds.getMax() : null);
    if (!min || !max) return null;
    center = new Laya.Vector3((min.x + max.x) / 2, (min.y + max.y) / 2, (min.z + max.z) / 2);
    extent = new Laya.Vector3((max.x - min.x) / 2, (max.y - min.y) / 2, (max.z - min.z) / 2);
    return { center, extent };
  }

  function transformLocalBounds(parts, transform) {
    const matrix = transform && (transform.worldMatrix || transform._worldMatrix);
    const elements = matrix && matrix.elements;
    if (!elements || elements.length < 16) return parts;
    const center = parts.center;
    const extent = parts.extent;
    return {
      center: new Laya.Vector3(
        elements[0] * center.x + elements[4] * center.y + elements[8] * center.z + elements[12],
        elements[1] * center.x + elements[5] * center.y + elements[9] * center.z + elements[13],
        elements[2] * center.x + elements[6] * center.y + elements[10] * center.z + elements[14],
      ),
      extent: new Laya.Vector3(
        Math.abs(elements[0]) * extent.x + Math.abs(elements[4]) * extent.y + Math.abs(elements[8]) * extent.z,
        Math.abs(elements[1]) * extent.x + Math.abs(elements[5]) * extent.y + Math.abs(elements[9]) * extent.z,
        Math.abs(elements[2]) * extent.x + Math.abs(elements[6]) * extent.y + Math.abs(elements[10]) * extent.z,
      ),
    };
  }

  function findNodeByName(root, name) {
    if (!root || !name) return null;
    if (root.name === name) return root;
    const children = childNodes(root);
    for (const child of children) {
      const found = findNodeByName(child, name);
      if (found) return found;
    }
    return null;
  }

  function findFirstCamera(root) {
    if (!root) return null;
    if (root instanceof Laya.Camera) return root;
    const children = childNodes(root);
    for (const child of children) {
      const found = findFirstCamera(child);
      if (found) return found;
    }
    return null;
  }

  function walk(root, visitor) {
    if (!root) return;
    visitor(root);
    for (const child of childNodes(root)) {
      walk(child, visitor);
    }
  }

  function childNodes(root) {
    if (!root) return [];
    if (Array.isArray(root._children)) return root._children;
    const count = typeof root.numChildren === "number" ? root.numChildren : 0;
    const out = [];
    for (let i = 0; i < count; i += 1) {
      out.push(root.getChildAt(i));
    }
    return out;
  }

  function waitFrames(count) {
    return new Promise((resolve) => {
      function step(remaining) {
        if (remaining <= 0) {
          resolve();
          return;
        }
        requestAnimationFrame(() => step(remaining - 1));
      }
      const frameCount = Number.isFinite(Number(count))
        ? Math.max(0, Math.floor(Number(count)))
        : 1;
      step(frameCount);
    });
  }

  function resolveSettleFrames(command) {
    const value = Number(command && command.settle_frames);
    return Number.isFinite(value) ? Math.max(0, Math.floor(value)) : 2;
  }

  function resolveAnimationFreezeSettleFrames(command) {
    const value = Number(command && command.animation_freeze_settle_frames);
    return Number.isFinite(value) ? Math.max(0, Math.floor(value)) : 3;
  }

  function numberOr(value, fallback) {
    const parsed = Number(value);
    return Number.isFinite(parsed) ? parsed : fallback;
  }

  function normalizedColor(value, fallback) {
    const raw = Array.isArray(value) && value.length >= 3 ? value : fallback;
    const scale = raw.some((item) => Number(item) > 1) ? 255 : 1;
    return new Laya.Color(
      numberOr(raw[0], 0) / scale,
      numberOr(raw[1], 0) / scale,
      numberOr(raw[2], 0) / scale,
      raw.length >= 4 ? numberOr(raw[3], scale) / scale : 1,
    );
  }

  function colorToCss(value, fallback) {
    if (!Array.isArray(value) || value.length < 3) return fallback;
    const scale = value.some((item) => Number(item) > 1) ? 1 : 255;
    const bytes = value.slice(0, 3).map((item) => Math.max(0, Math.min(255, Math.round(numberOr(item, 0) * scale))));
    return "#" + bytes.map((item) => item.toString(16).padStart(2, "0")).join("");
  }

  function applySceneProfile(scene, camera) {
    if (scene && runtimeProfile.ambient_color) {
      scene.ambientColor = normalizedColor(runtimeProfile.ambient_color, [0.42, 0.46, 0.53, 1]);
    }
    if (camera && runtimeProfile.background_color) {
      camera.clearFlag = Laya.CameraClearFlags && Laya.CameraClearFlags.SolidColor != null
        ? Laya.CameraClearFlags.SolidColor
        : camera.clearFlag;
      camera.clearColor = normalizedColor(runtimeProfile.background_color, [0, 0, 0, 1]);
    }
  }

  function addProfileLights(scene) {
    const lights = Array.isArray(runtimeProfile.directional_lights) ? runtimeProfile.directional_lights : [];
    for (const config of lights) {
      try {
        const node = new Laya.Sprite3D();
        node.name = String(config.name || "Material Fit Direction Light");
        scene.addChild(node);
        const euler = Array.isArray(config.rotation_euler) ? config.rotation_euler : [-50, 30, 0];
        node.transform.localRotationEuler = new Laya.Vector3(
          numberOr(euler[0], -50),
          numberOr(euler[1], 30),
          numberOr(euler[2], 0),
        );
        const LightType = Laya.DirectionLightCom || Laya.DirectionLight;
        if (!LightType || typeof node.addComponent !== "function") continue;
        const light = node.addComponent(LightType);
        light.color = normalizedColor(config.color, [0.6, 0.6, 0.6, 1]);
        if (Number.isFinite(Number(config.intensity))) light.intensity = Number(config.intensity);
      } catch (error) {
        console.warn("[material-fit] profile light creation failed: " + error);
      }
    }
  }

  function configuredAnimationMode(command) {
    return String(command && command.animation_mode || captureDefaults.animation_mode || runtimeProfile.animation_mode || "disabled");
  }

  function prepareStartupAnimators(root) {
    if (configuredAnimationMode(null) !== "disabled" || !root || !Laya.Animator) return;
    const animators = collectComponents(root, Laya.Animator);
    const command = commandWithProfileDefaults({ animation_mode: "disabled" });
    for (const animator of animators) {
      applyFixedAnimation(command, animator);
    }
    const defaultStates = animators.map((animator) => defaultAnimationStateName(animator, 0));
    console.log(
      "[material-fit] startup animators disabled count=" + animators.length
      + " default_states=" + defaultStates.join(","),
    );
  }

  function commandWithProfileDefaults(command) {
    return Object.assign({}, captureDefaults, command || {});
  }

  function collectComponents(root, componentType) {
    const out = [];
    if (!root || !componentType) return out;
    walk(root, (node) => {
      if (!node) return;
      try {
        if (typeof node.getComponents === "function") {
          const found = node.getComponents(componentType);
          if (found && typeof found.length === "number") {
            for (let i = 0; i < found.length; i += 1) addUniqueComponent(found[i], out);
          }
        } else if (typeof node.getComponent === "function") {
          addUniqueComponent(node.getComponent(componentType), out);
        }
      } catch {
        // Some Laya builds throw for components that are registered in the scene but not in this runtime.
      }
      for (const list of [node._components, node._component, node.components]) {
        if (!list || typeof list.length !== "number") continue;
        for (let i = 0; i < list.length; i += 1) {
          const component = list[i];
          const constructorName = component && component.constructor && component.constructor.name || "";
          const expectedName = componentType && componentType.name || "";
          if (component instanceof componentType || (expectedName && constructorName === expectedName)) {
            addUniqueComponent(component, out);
          }
        }
      }
    });
    return out;
  }

  function addUniqueComponent(component, out) {
    if (component && out.indexOf(component) < 0) out.push(component);
  }

  function freezeSceneScripts(command, root) {
    if (command && command.freeze_scene_scripts === false) return [];
    const scriptType = Laya.Script3D;
    if (!root || !scriptType) return [];
    const scripts = collectComponents(root, scriptType);
    const states = [];
    for (const script of scripts) {
      if (!script) continue;
      const state = {
        source: script,
        enabled: typeof script.enabled === "boolean" ? script.enabled : null,
        privateEnabled: typeof script._enabled === "boolean" ? script._enabled : null,
        rotate: isVector3Like(script.rotate) ? script.rotate.clone() : null,
      };
      if (state.enabled === null && state.privateEnabled === null && state.rotate === null) continue;
      states.push(state);
      try {
        if (state.enabled !== null) script.enabled = false;
        if (state.privateEnabled !== null) script._enabled = false;
        if (state.rotate !== null) script.rotate = new Laya.Vector3(0, 0, 0);
      } catch (error) {
        console.warn("[material-fit] scene script freeze failed: " + error);
      }
    }
    return states;
  }

  function restoreSceneScripts(states) {
    for (const state of states || []) {
      try {
        if (state.enabled !== null) state.source.enabled = state.enabled;
        if (state.privateEnabled !== null) state.source._enabled = state.privateEnabled;
        if (state.rotate !== null) state.source.rotate = state.rotate;
      } catch (error) {
        console.warn("[material-fit] scene script restore failed: " + error);
      }
    }
  }

  function freezeAnimators(command, root) {
    if (command && command.freeze_animators === false) return [];
    const animatorType = Laya.Animator;
    if (!root || !animatorType) return [];
    const animators = collectComponents(root, animatorType);
    if (!animatorDiscoveryLogged) {
      animatorDiscoveryLogged = true;
      console.log(
        "[material-fit] animator discovery type=" + Boolean(animatorType)
        + " count=" + animators.length
        + " state=" + (command && command.fixed_animation_state || "")
        + " time=" + numberOr(command && command.fixed_animation_time, 0),
      );
    }
    const states = [];
    for (const animator of animators) {
      const state = {
        source: animator,
        speed: typeof animator.speed === "number" ? animator.speed : null,
        enabled: typeof animator.enabled === "boolean" ? animator.enabled : null,
        sleep: typeof animator.sleep === "boolean" ? animator.sleep : null,
      };
      states.push(state);
      applyFixedAnimation(command, animator);
    }
    return states;
  }

  function restoreAnimators(states) {
    for (const state of states || []) {
      const animator = state.source;
      try {
        if (state.speed !== null) animator.speed = state.speed;
        if (state.sleep !== null) animator.sleep = state.sleep;
        if (state.enabled !== null) animator.enabled = state.enabled;
      } catch (error) {
        console.warn("[material-fit] animator restore failed: " + error);
      }
    }
  }

  function applyFixedAnimation(command, animator) {
    if (!animator) return;
    const animationMode = configuredAnimationMode(command);
    const layerIndex = Number.isFinite(Number(command && command.fixed_animation_layer))
      ? Math.max(0, Math.floor(Number(command.fixed_animation_layer)))
      : 0;
    const configuredStateName = command && typeof command.fixed_animation_state === "string"
      ? command.fixed_animation_state
      : "";
    const stateName = configuredStateName;
    if (animationMode === "disabled") {
      try {
        animator.speed = 0;
        if (typeof animator.sleep === "boolean") animator.sleep = true;
        if (typeof animator.enabled === "boolean") animator.enabled = false;
      } catch (error) {
        console.warn("[material-fit] animator disable failed: " + error);
      }
      return;
    }
    const normalizedTime = Number.isFinite(Number(command && command.fixed_animation_time))
      ? Math.max(0, Math.min(1, Number(command.fixed_animation_time)))
      : 0;
    try {
      if (typeof animator.enabled === "boolean") animator.enabled = true;
      if (typeof animator.sleep === "boolean") animator.sleep = false;
      if (stateName && typeof animator.play === "function") {
        // Laya skips sampling at speed 0. A tiny nonzero speed evaluates the
        // requested pose without adding frame-time-dependent visible motion.
        animator.speed = FIXED_ANIMATION_SAMPLE_SPEED;
        animator.play(stateName, layerIndex, normalizedTime);
      }
    } catch (error) {
      console.warn("[material-fit] animator freeze failed: " + error);
    }
  }

  function defaultAnimationStateName(animator, layerIndex) {
    if (!animator) return "";
    try {
      const layer = typeof animator.getControllerLayer === "function"
        ? animator.getControllerLayer(layerIndex)
        : animator._controllerLayers && animator._controllerLayers[layerIndex];
      if (!layer) return "";
      const state = layer.defaultState || layer._defaultState
        || layer.states && layer.states[0]
        || layer._states && layer._states[0];
      return state && typeof state.name === "string" ? state.name : "";
    } catch (error) {
      console.warn("[material-fit] default animator state lookup failed: " + error);
      return "";
    }
  }

  function applyFixedAnimations(command, states) {
    for (const state of states || []) {
      applyFixedAnimation(command, state.source);
    }
  }

  function pauseAnimators(states) {
    for (const state of states || []) {
      if (state && state.source && typeof state.source.speed === "number") {
        state.source.speed = 0;
      }
    }
  }

  function isVector3Like(value) {
    return value
      && typeof value.x === "number"
      && typeof value.y === "number"
      && typeof value.z === "number";
  }

  function collectMaterials(root) {
    const out = [];
    walk(root, (node) => {
      const sources = collectNodeRenderableSources(node);
      for (const source of sources) {
        const materials = source && (source.sharedMaterials || source.materials || source._materials || (source.sharedMaterial ? [source.sharedMaterial] : null));
        if (!materials) continue;
        for (const material of materials) {
          if (material && out.indexOf(material) < 0) out.push(material);
        }
      }
    });
    return out;
  }

  function ensureRuntimeMaterialCompatibility(root) {
    const materials = collectMaterials(root);
    let patched = 0;
    for (const material of materials) {
      const rules = Array.isArray(runtimeProfile.material_compatibility)
        ? runtimeProfile.material_compatibility
        : [{ legacy_fish_standard: true, enable_defines: ["DIRECTIONLIGHT"] }];
      for (const rule of rules) {
        if (!materialMatchesCompatibilityRule(material, rule)) continue;
        for (const defineName of Array.isArray(rule.enable_defines) ? rule.enable_defines : []) {
          try {
            const define = Laya.Shader3D && typeof Laya.Shader3D.getDefineByName === "function"
              ? Laya.Shader3D.getDefineByName(String(defineName))
              : null;
            if (!define) continue;
            const hasDefine = typeof material.hasDefine === "function" && material.hasDefine(define);
            if (!hasDefine && typeof material.addDefine === "function") {
              material.addDefine(define);
              patched += 1;
            }
          } catch (error) {
            console.warn("[material-fit] material compatibility patch failed: " + error);
          }
        }
      }
    }
    if (patched > 0) {
      console.log("[material-fit] applied material compatibility defines=" + patched);
    }
  }

  function materialMatchesCompatibilityRule(material, rule) {
    if (!material || !rule || typeof rule !== "object") return false;
    if (rule.legacy_fish_standard === true) return looksLikeFishStandardMaterial(material);
    const shaderName = String(
      material.shaderName
      || material._shaderName
      || material._shader && material._shader.name
      || material.shader && material.shader.name
      || "",
    );
    if (rule.shader_name && shaderName !== String(rule.shader_name)) return false;
    if (rule.shader_name_contains && shaderName.indexOf(String(rule.shader_name_contains)) < 0) return false;
    return Boolean(rule.shader_name || rule.shader_name_contains);
  }

  function looksLikeFishStandardMaterial(material) {
    if (!material) return false;
    const shaderName = String(
      material.shaderName
      || material._shaderName
      || material._shader && material._shader.name
      || material.shader && material.shader.name
      || "",
    );
    if (shaderName.indexOf("FishStandar") >= 0) return true;
    const shaderData = material.shaderData;
    if (!shaderData || !Laya.Shader3D || typeof Laya.Shader3D.propertyNameToID !== "function") return false;
    const id = Laya.Shader3D.propertyNameToID("u_LightRotateX");
    try {
      if (typeof shaderData.getNumber === "function") {
        const value = shaderData.getNumber(id);
        return Number.isFinite(Number(value));
      }
    } catch {
      return false;
    }
    return false;
  }

  function collectRenderableSources(root) {
    const out = [];
    walk(root, (node) => {
      const sources = collectNodeRenderableSources(node);
      for (const source of sources) {
        if (source && out.indexOf(source) < 0) out.push(source);
      }
    });
    return out;
  }

  function collectNodeRenderableSources(node) {
    if (!node) return [];
    const out = [node.meshRenderer, node.skinnedMeshRenderer, node.renderer, node._renderNode];
    if (typeof node.getComponent === "function") {
      for (const type of [Laya.MeshRenderer, Laya.SkinnedMeshRenderer, Laya.SimpleSkinnedMeshRenderer]) {
        if (!type) continue;
        try {
          const component = node.getComponent(type);
          if (component) out.push(component);
        } catch {
          // Some Laya builds throw when a component class is absent or not registered.
        }
      }
    }
    for (const list of [node._components, node._component, node.components]) {
      if (!Array.isArray(list)) continue;
      for (const component of list) {
        const ctorName = component && component.constructor && component.constructor.name || "";
        if (/Renderer/i.test(ctorName)) out.push(component);
      }
    }
    return out.filter(Boolean);
  }

  function makeDebugMaterial(index) {
    const colors = [
      [0.95, 0.35, 0.18, 1],
      [0.18, 0.65, 0.95, 1],
      [0.55, 0.9, 0.25, 1],
      [0.95, 0.8, 0.18, 1],
    ];
    const rgba = colors[index % colors.length];
    const material = new Laya.UnlitMaterial();
    material.albedoColor = new Laya.Color(rgba[0], rgba[1], rgba[2], rgba[3]);
    return material;
  }

  function applyDebugMaterials(root) {
    const sources = collectRenderableSources(root);
    for (let i = 0; i < sources.length; i += 1) {
      const material = makeDebugMaterial(i);
      const source = sources[i];
      try {
        if ("material" in source) source.material = material;
        if ("sharedMaterial" in source) source.sharedMaterial = material;
        if ("materials" in source) source.materials = [material];
        if ("sharedMaterials" in source) source.sharedMaterials = [material];
      } catch (error) {
        console.warn("[material-fit] debug material assignment failed: " + error);
      }
    }
    console.log("[material-fit] applied debug materials renderables=" + sources.length);
  }

  function replaceMaterialsForSilhouette(root) {
    const entries = [];
    const material = new Laya.UnlitMaterial();
    material.albedoColor = new Laya.Color(1, 1, 1, 1);
    for (const source of collectRenderableSources(root)) {
      try {
        if (source.sharedMaterials && source.sharedMaterials.length) {
          const previous = Array.from(source.sharedMaterials);
          entries.push({ source, property: "sharedMaterials", previous });
          source.sharedMaterials = previous.map(() => material);
        } else if (source.materials && source.materials.length) {
          const previous = Array.from(source.materials);
          entries.push({ source, property: "materials", previous });
          source.materials = previous.map(() => material);
        } else if (source.sharedMaterial) {
          entries.push({ source, property: "sharedMaterial", previous: source.sharedMaterial });
          source.sharedMaterial = material;
        } else if (source.material) {
          entries.push({ source, property: "material", previous: source.material });
          source.material = material;
        }
      } catch (error) {
        console.warn("[material-fit] silhouette material assignment failed: " + error);
      }
    }
    return entries;
  }

  function restoreSilhouetteMaterials(entries) {
    for (const entry of entries) {
      try {
        entry.source[entry.property] = entry.previous;
      } catch (error) {
        console.warn("[material-fit] silhouette material restore failed: " + error);
      }
    }
  }

  const COLOR_PARAM_NAMES = new Set([
    "albedoColor",
    "color",
    "u_BaseColor",
    "u_Color",
    "u_ReflectColor",
    "u_ShadowColor1",
    "u_ShadowColor2",
    "u_SpecularColor",
    "u_RimColor",
  ]);

  function isColorParamName(name) {
    return COLOR_PARAM_NAMES.has(name) || String(name || "").toLowerCase().indexOf("color") >= 0;
  }

  function setShaderDataValue(material, name, value, kind) {
    if (kind === "color" && typeof material.setColor === "function") {
      material.setColor(name, value);
      return;
    }
    if (kind === "number" && typeof material.setFloat === "function") {
      material.setFloat(name, value);
      return;
    }
    if (kind === "bool" && typeof material.setBool === "function") {
      material.setBool(name, Boolean(value));
      return;
    }
    if (kind === "vector4" && typeof material.setVector4 === "function") {
      material.setVector4(name, value);
      return;
    }
    if (kind === "vector3" && typeof material.setVector3 === "function") {
      material.setVector3(name, value);
      return;
    }
    if (kind === "vector2" && typeof material.setVector2 === "function") {
      material.setVector2(name, value);
      return;
    }
    const shaderData = material && material.shaderData;
    if (!shaderData || !Laya.Shader3D || typeof Laya.Shader3D.propertyNameToID !== "function") return;
    const id = Laya.Shader3D.propertyNameToID(name);
    if (kind === "color" && typeof shaderData.setColor === "function") {
      shaderData.setColor(id, value);
    } else if (kind === "number" && typeof shaderData.setNumber === "function") {
      shaderData.setNumber(id, value);
    } else if (kind === "bool" && typeof shaderData.setBool === "function") {
      shaderData.setBool(id, Boolean(value));
    } else if (kind === "vector4" && typeof shaderData.setVector === "function") {
      shaderData.setVector(id, value);
    } else if (kind === "vector3" && typeof shaderData.setVector3 === "function") {
      shaderData.setVector3(id, value);
    } else if (kind === "vector2" && typeof shaderData.setVector2 === "function") {
      shaderData.setVector2(id, value);
    }
  }

  function setMaterialValue(material, name, value) {
    if (!material) return;
    if (Array.isArray(value) && value.length === 4 && isColorParamName(name)) {
      const color = new Laya.Color(
        Math.max(0, Math.min(1, numberOr(value[0], 0))),
        Math.max(0, Math.min(1, numberOr(value[1], 0))),
        Math.max(0, Math.min(1, numberOr(value[2], 0))),
        Math.max(0, Math.min(1, numberOr(value[3], 1))),
      );
      if ("albedoColor" in material) {
        material.albedoColor = color;
      }
      setShaderDataValue(material, name, color, "color");
      return;
    }
    if (Array.isArray(value) && value.length === 4 && Laya.Vector4) {
      setShaderDataValue(material, name, new Laya.Vector4(
        numberOr(value[0], 0),
        numberOr(value[1], 0),
        numberOr(value[2], 0),
        numberOr(value[3], 0),
      ), "vector4");
      return;
    }
    if (Array.isArray(value) && value.length === 3 && Laya.Vector3) {
      setShaderDataValue(material, name, new Laya.Vector3(
        numberOr(value[0], 0),
        numberOr(value[1], 0),
        numberOr(value[2], 0),
      ), "vector3");
      return;
    }
    if (Array.isArray(value) && value.length === 2 && Laya.Vector2) {
      setShaderDataValue(material, name, new Laya.Vector2(
        numberOr(value[0], 0),
        numberOr(value[1], 0),
      ), "vector2");
      return;
    }
    if (typeof value === "number" || typeof value === "boolean") {
      setShaderDataValue(
        material,
        name,
        typeof value === "boolean" ? (value ? 1 : 0) : value,
        typeof value === "boolean" ? "bool" : "number",
      );
    }
  }

  const MATERIAL_DEFINE_ALLOWLIST = new Set([
    "NORMALMAP",
    "NORMALMAP_Y_INVERT",
    "RIMSMOOTHNESS",
  ]);
  const MATERIAL_RENDER_STATE_PROPERTIES = Object.freeze({
    renderQueue: "renderQueue",
    s_Cull: "cull",
    s_Blend: "blend",
    s_BlendSrc: "blendSrc",
    s_BlendDst: "blendDst",
    s_BlendSrcRGB: "blendSrcRGB",
    s_BlendDstRGB: "blendDstRGB",
    s_BlendSrcAlpha: "blendSrcAlpha",
    s_BlendDstAlpha: "blendDstAlpha",
    s_BlendEquation: "blendEquation",
    s_BlendEquationRGB: "blendEquationRGB",
    s_BlendEquationAlpha: "blendEquationAlpha",
    s_DepthTest: "depthTest",
    s_DepthWrite: "depthWrite",
  });

  function normalizeMaterialDefinePatch(patch) {
    if (!patch || typeof patch !== "object") return null;
    const managed = Array.isArray(patch.managed) ? patch.managed.map(String) : [];
    const enabled = Array.isArray(patch.enabled) ? patch.enabled.map(String) : [];
    for (const name of [...managed, ...enabled]) {
      if (!MATERIAL_DEFINE_ALLOWLIST.has(name)) {
        throw new Error("material define is not allowed: " + name);
      }
    }
    const managedSet = new Set(managed);
    for (const name of enabled) {
      if (!managedSet.has(name)) {
        throw new Error("enabled material define is not managed: " + name);
      }
    }
    // The shader reads NORMALMAP_Y_INVERT only inside its NORMALMAP block, so
    // the standalone source-material state is a valid no-op and must round-trip.
    return { managed: [...managedSet], enabled: [...new Set(enabled)] };
  }

  function applyMaterialDefines(material, definePatch) {
    if (!definePatch) return 0;
    if (!Laya.Shader3D || typeof Laya.Shader3D.getDefineByName !== "function") {
      throw new Error("Laya.Shader3D.getDefineByName is unavailable");
    }
    const enabled = new Set(definePatch.enabled);
    let count = 0;
    for (const name of definePatch.managed) {
      const define = Laya.Shader3D.getDefineByName(name);
      if (!define) throw new Error("material define is unknown to Laya: " + name);
      const shouldEnable = enabled.has(name);
      const isEnabled = typeof material.hasDefine === "function" ? material.hasDefine(define) : null;
      if (isEnabled === shouldEnable) continue;
      if (shouldEnable) {
        if (typeof material.addDefine !== "function") throw new Error("material.addDefine is unavailable");
        material.addDefine(define);
      } else {
        if (typeof material.removeDefine !== "function") throw new Error("material.removeDefine is unavailable");
        material.removeDefine(define);
      }
      count += 1;
    }
    return count;
  }

  function applyMaterialRenderStates(material, renderStates) {
    if (!renderStates || typeof renderStates !== "object") return 0;
    let count = 0;
    for (const [name, value] of Object.entries(renderStates)) {
      const propertyName = MATERIAL_RENDER_STATE_PROPERTIES[name];
      if (!propertyName) throw new Error("material render state is not allowed: " + name);
      if (!(propertyName in material)) throw new Error("material render state is unavailable: " + propertyName);
      material[propertyName] = value;
      count += 1;
    }
    return count;
  }

  function applyMaterialPatch(command) {
    if (command && (command.debug_material || command.force_debug_material)) {
      applyDebugMaterials(runtime.target);
      return { applied: true, material_count: 0, value_count: 0, define_count: 0, render_state_count: 0, applied_render_states: {}, debug_material: true };
    }

    const patch = command && command.material_patch;
    const values = patch && patch.values;
    const definePatch = normalizeMaterialDefinePatch(patch && patch.defines);
    const renderStates = patch && patch.render_states;
    const hasValues = values && typeof values === "object";
    const hasRenderStates = renderStates && typeof renderStates === "object";
    if (!hasValues && !definePatch && !hasRenderStates) {
      return { applied: false, material_count: 0, value_count: 0, define_count: 0, render_state_count: 0, enabled_defines: [], applied_render_states: {} };
    }

    const vector = hasValues
      ? [values.u_BaseColor, values.u_Color, values.albedoColor, values.color]
        .find((item) => Array.isArray(item) && item.length >= 3)
      : null;
    if (vector) {
      lastColor = [
        Math.max(0, Math.min(1, numberOr(vector[0], lastColor[0]))),
        Math.max(0, Math.min(1, numberOr(vector[1], lastColor[1]))),
        Math.max(0, Math.min(1, numberOr(vector[2], lastColor[2]))),
        Math.max(0, Math.min(1, numberOr(vector[3], lastColor[3]))),
      ];
    }

    const scalar = hasValues ? numberOr(values.u_Metallic ?? values.u_Roughness ?? values.value, NaN) : NaN;
    if (Number.isFinite(scalar) && !vector) {
      lastColor = [
        Math.max(0, Math.min(1, scalar)),
        Math.max(0, Math.min(1, 1 - scalar)),
        Math.max(0, Math.min(1, 0.25 + 0.5 * scalar)),
        1,
      ];
    }

    const materials = collectMaterials(runtime.materialTarget || runtime.target);
    let defineCount = 0;
    let valueCount = 0;
    let renderStateCount = 0;
    for (const material of materials) {
      defineCount += applyMaterialDefines(material, definePatch);
      renderStateCount += applyMaterialRenderStates(material, renderStates);
      for (const [name, value] of Object.entries(hasValues ? values : {})) {
        try {
          setMaterialValue(material, name, value);
          valueCount += 1;
        } catch (error) {
          console.warn("[material-fit] material patch skipped " + name + ": " + error);
        }
      }
    }
    return {
      applied: materials.length > 0,
      material_count: materials.length,
      value_count: valueCount,
      define_count: defineCount,
      render_state_count: renderStateCount,
      enabled_defines: definePatch ? definePatch.enabled : [],
      applied_render_states: hasRenderStates ? { ...renderStates } : {},
    };
  }

  function drawView(command, view) {
    const yaw = numberOr(view && view.yaw, 0);
    const pitch = numberOr(view && view.pitch, 0);
    if (command && Number.isFinite(Number(command.orthographic_vertical_size)) && "orthographicVerticalSize" in runtime.camera) {
      runtime.camera.orthographic = true;
      runtime.camera.orthographicVerticalSize = Number(command.orthographic_vertical_size);
    }
    const preserveTarget = command && command.preserve_target_transform === true;
    const initialEuler = runtime.initialTargetEuler || new Laya.Vector3(0, 0, 0);
    const baseYaw = numberOr(command.target_base_yaw, preserveTarget ? initialEuler.y : 0);
    const basePitch = numberOr(command.target_base_pitch, preserveTarget ? initialEuler.x : 0);
    const baseRoll = numberOr(command.target_base_roll, preserveTarget ? initialEuler.z : 0);
    const yawSign = numberOr(command.target_yaw_sign, -1);
    const pitchSign = numberOr(command.target_pitch_sign, -1);
    if (command && command.capture_mode === "orbit_camera") {
      runtime.target.transform.localRotationEuler = new Laya.Vector3(
        basePitch,
        baseYaw,
        baseRoll,
      );
      orbitCamera(runtime.camera, runtime.frame, yaw, pitch, command);
    } else {
      runtime.target.transform.localRotationEuler = new Laya.Vector3(
        basePitch + pitchSign * pitch,
        baseYaw + yawSign * yaw,
        baseRoll,
      );
    }
    if (runtime.fallbackMaterial) {
      runtime.fallbackMaterial.albedoColor = new Laya.Color(lastColor[0], lastColor[1], lastColor[2], lastColor[3]);
    }
  }

  function orbitCamera(camera, frame, yaw, pitch, command) {
    const configuredCenter = command && command.camera_center;
    const center = Array.isArray(configuredCenter) && configuredCenter.length >= 3
      ? new Laya.Vector3(numberOr(configuredCenter[0], 0), numberOr(configuredCenter[1], 0), numberOr(configuredCenter[2], 0))
      : frame && frame.center || new Laya.Vector3(0, 0, 0);
    const radius = numberOr(command && command.camera_distance, frame && frame.radius || 4);
    const yawRad = (numberOr(command && command.yaw_offset, 0) + yaw) * Math.PI / 180;
    const pitchRad = (numberOr(command && command.pitch_offset, 0) + pitch) * Math.PI / 180;
    const cosPitch = Math.cos(pitchRad);
    const position = new Laya.Vector3(
      center.x + Math.sin(yawRad) * cosPitch * radius,
      center.y + Math.sin(pitchRad) * radius + radius * numberOr(command && command.camera_height_factor, 0.12),
      center.z + Math.cos(yawRad) * cosPitch * radius,
    );
    camera.transform.position = position;
    camera.transform.lookAt(center, new Laya.Vector3(0, 1, 0));
  }

  function scoreReadbackDimensions(command) {
    const browserScore = command && command.browser_score && typeof command.browser_score === "object"
      ? command.browser_score
      : {};
    return {
      width: Math.max(64, Math.min(width, Math.floor(numberOr(browserScore.readback_width, width)))),
      height: Math.max(64, Math.min(height, Math.floor(numberOr(browserScore.readback_height, height)))),
    };
  }

  function stageCanvas(command) {
    const canvas = document.querySelector("canvas");
    if (!canvas) throw new Error("Laya canvas not found");
    const dimensions = scoreReadbackDimensions(command);
    if (
      !scoreReadbackCanvas
      || scoreReadbackCanvas.width !== dimensions.width
      || scoreReadbackCanvas.height !== dimensions.height
    ) {
      scoreReadbackCanvas = document.createElement("canvas");
      scoreReadbackCanvas.width = dimensions.width;
      scoreReadbackCanvas.height = dimensions.height;

      rgbSums[1] += green / 255.0 * weight;
      rgbSums[2] += blue / 255.0 * weight;
      const normalizedRed = red / 255.0;
      const normalizedGreen = green / 255.0;
      const normalizedBlue = blue / 255.0;
      chromaOpponentSums[0] += (
        Math.max(normalizedRed, normalizedGreen, normalizedBlue)
        - Math.min(normalizedRed, normalizedGreen, normalizedBlue)
      ) * weight;
      chromaOpponentSums[1] += (
        (2 * normalizedRed - normalizedGreen - normalizedBlue) / 2
      ) * weight;
      chromaOpponentSums[2] += (normalizedGreen - normalizedBlue) * weight;
      highlightWeight += Math.max(0, pixelLuma - 0.65) * weight;
    }
    const prepared = {
      rgb,
      foreground,
      luma,
      rgbSums,
      chromaOpponentSums,
      foregroundWeight,
      highlightWeight,
    };
    referenceV2FeatureCache.set(reference, prepared);
    return prepared;
  }

  function scoreMaterialComponentsV4(
    candidate,
    reference,
    width,
    height,
    residualGridSize = 4,
    residualSketchSize = 128,
    strictCanvasCore = false,
  ) {
    const referencePrepared = prepareExactMaterialPixels(reference, width, height, true);
    const candidatePrepared = prepareExactMaterialPixels(candidate, width, height, false);
    const pixelCount = Math.min(referencePrepared.pixelCount, candidatePrepared.pixelCount);
    const intersection = new Uint8Array(pixelCount);
    let intersectionCount = 0;
    let unionCount = 0;
    for (let index = 0; index < pixelCount; index += 1) {
      const referenceForeground = referencePrepared.foreground[index] !== 0;
      const candidateForeground = candidatePrepared.foreground[index] !== 0;
      if (referenceForeground || candidateForeground) unionCount += 1;
      if (referenceForeground && candidateForeground) {
        intersection[index] = 1;
        intersectionCount += 1;
      }
    }
    const overlapCoefficient = intersectionCount / Math.max(
      1,
      Math.min(referencePrepared.foregroundCount, candidatePrepared.foregroundCount),
    );
    const core = erodeBinaryMask(intersection, width, height, 2);
    let coreCount = 0;
    let rgbErrorSum = 0;
    const referenceChromaOpponentSums = [0, 0, 0];
    const candidateChromaOpponentSums = [0, 0, 0];
    const residualSums = new Float64Array(residualGridSize * residualGridSize * 3);
    const residualWeights = new Uint32Array(residualGridSize * residualGridSize);
    const residualSketchSums = new Float64Array(residualSketchSize * 3);
    const residualSketchWeights = new Uint32Array(residualSketchSize);
    for (let index = 0; index < pixelCount; index += 1) {
      if (core[index] === 0) continue;
      coreCount += 1;
      const rgbIndex = index * 3;
      const referenceRed = referencePrepared.rgb[rgbIndex];
      const referenceGreen = referencePrepared.rgb[rgbIndex + 1];
      const referenceBlue = referencePrepared.rgb[rgbIndex + 2];
      const candidateRed = candidatePrepared.rgb[rgbIndex];
      const candidateGreen = candidatePrepared.rgb[rgbIndex + 1];
      const candidateBlue = candidatePrepared.rgb[rgbIndex + 2];
      const residualRed = candidateRed - referenceRed;
      const residualGreen = candidateGreen - referenceGreen;
      const residualBlue = candidateBlue - referenceBlue;
      rgbErrorSum += (
        Math.abs(residualRed)
        + Math.abs(residualGreen)
        + Math.abs(residualBlue)
      ) / 3.0;
      accumulateChromaOpponent(referenceChromaOpponentSums, referenceRed, referenceGreen, referenceBlue);
      accumulateChromaOpponent(candidateChromaOpponentSums, candidateRed, candidateGreen, candidateBlue);
      const pixelX = index % width;
      const pixelY = Math.floor(index / width);
      const gridX = Math.min(residualGridSize - 1, Math.floor(pixelX * residualGridSize / width));
      const gridY = Math.min(residualGridSize - 1, Math.floor(pixelY * residualGridSize / height));
      const cellIndex = gridY * residualGridSize + gridX;
      const featureIndex = cellIndex * 3;
      residualWeights[cellIndex] += 1;
      residualSums[featureIndex] += residualRed;
      residualSums[featureIndex + 1] += residualGreen;
      residualSums[featureIndex + 2] += residualBlue;
      const residualHash = Math.imul((index ^ 2654435769) >>> 0, 2246822519) >>> 0;
      const sketchCellIndex = residualHash % residualSketchSize;
      const sketchFeatureIndex = sketchCellIndex * 3;
      const sketchSign = (residualHash & 2147483648) !== 0 ? 1 : -1;
      residualSketchWeights[sketchCellIndex] += 1;
      residualSketchSums[sketchFeatureIndex] += residualRed * sketchSign;
      residualSketchSums[sketchFeatureIndex + 1] += residualGreen * sketchSign;
      residualSketchSums[sketchFeatureIndex + 2] += residualBlue * sketchSign;
    }
    const minimumForegroundPixels = Math.min(
      referencePrepared.foregroundCount,
      candidatePrepared.foregroundCount,
    );
    const minimumCoreBasisPixels = strictCanvasCore
      ? pixelCount
      : minimumForegroundPixels;
    const minimumCorePixels = Math.max(
      256,
      Math.floor(0.02 * minimumCoreBasisPixels),
    );
    if (coreCount < minimumCorePixels || overlapCoefficient < 0.75) {
      return {
        fit_score: 0,
        diff_score: 1,
        material_components: null,
        chroma_opponent_residuals: [],
        geometry_valid: false,
        foreground_overlap_coefficient: overlapCoefficient,
        mask_iou: intersectionCount / Math.max(1, unionCount),
        trusted_core_pixels: coreCount,
        minimum_trusted_core_pixels: minimumCorePixels,
        minimum_core_basis: strictCanvasCore ? "full_canvas" : "minimum_foreground",
        minimum_core_basis_pixels: minimumCoreBasisPixels,
        minimum_foreground_pixels: minimumForegroundPixels,
        reference_foreground_pixels: referencePrepared.foregroundCount,
        candidate_foreground_pixels: candidatePrepared.foregroundCount,
      };
    }
    const foregroundRgbError = rgbErrorSum / coreCount;
    const colorDistributionError = exactColorDistributionError(referencePrepared, candidatePrepared);
    const luminanceStructureError = exactMultiscaleLuminanceError(
      referencePrepared.maskedLuma,
      candidatePrepared.maskedLuma,
      core,
      width,
      height,
    );
    const detailTextureError = exactDetailError(
      referencePrepared.maskedLuma,
      candidatePrepared.maskedLuma,
      core,
      width,
      height,
    );
    const highlightEmissionError = exactHighlightError(
      referencePrepared.foregroundLuma,
      candidatePrepared.foregroundLuma,
      referencePrepared.foregroundLumaSorted,
    );
    const referenceChromaOpponentMeans = referenceChromaOpponentSums.map((value) => value / coreCount);
    const candidateChromaOpponentMeans = candidateChromaOpponentSums.map((value) => value / coreCount);
    const chromaOpponentResiduals = candidateChromaOpponentMeans.map(
      (value, index) => value - referenceChromaOpponentMeans[index],
    );
    const chromaHueError = clamp01(
      2 * (
        0.50 * Math.abs(chromaOpponentResiduals[0])
        + 0.25 * Math.abs(chromaOpponentResiduals[1])
        + 0.25 * Math.abs(chromaOpponentResiduals[2])
      ),
    );
    const materialComponents = {
      foreground_rgb: clamp01(1 - foregroundRgbError),
      color_distribution: clamp01(1 - colorDistributionError),
      chroma_hue: clamp01(1 - chromaHueError),
      luminance_structure: clamp01(1 - luminanceStructureError),
      detail_texture: clamp01(1 - detailTextureError),
      highlight_emission: clamp01(1 - highlightEmissionError),
    };
    const fitScore = clamp01(
      0.30 * materialComponents.foreground_rgb
      + 0.15 * materialComponents.color_distribution
      + 0.25 * materialComponents.chroma_hue
      + 0.12 * materialComponents.luminance_structure
      + 0.08 * materialComponents.detail_texture
      + 0.10 * materialComponents.highlight_emission,
    );
    const residualFeatures = Array.from(residualSums, (value, index) => {
      const weight = residualWeights[Math.floor(index / 3)];
      return weight > 0 ? value / weight : 0;
    });
    const residualSketchFeatures = Array.from(residualSketchSums, (value, index) => {
      const weight = residualSketchWeights[Math.floor(index / 3)];
      return weight > 0 ? value / weight : 0;
    });
    return {
      fit_score: fitScore,
      diff_score: 1 - fitScore,
      rgb_mae: foregroundRgbError,
      alpha_mae: 0,
      material_components: materialComponents,
      chroma_opponent_residuals: chromaOpponentResiduals,
      geometry_valid: true,
      foreground_overlap_coefficient: overlapCoefficient,
      mask_iou: intersectionCount / Math.max(1, unionCount),
      trusted_core_pixels: coreCount,
      minimum_trusted_core_pixels: minimumCorePixels,
      minimum_core_basis: strictCanvasCore ? "full_canvas" : "minimum_foreground",
      minimum_core_basis_pixels: minimumCoreBasisPixels,
      minimum_foreground_pixels: minimumForegroundPixels,
      reference_foreground_pixels: referencePrepared.foregroundCount,
      candidate_foreground_pixels: candidatePrepared.foregroundCount,
      foreground_weight_sum: coreCount,
      residual_grid_size: residualGridSize,
      residual_sketch_size: residualSketchSize,
      residual_features: residualFeatures.concat(residualSketchFeatures, chromaOpponentResiduals),
    };
  }

  function prepareExactMaterialPixels(pixels, width, height, cacheReference) {
    if (cacheReference) {
      const cached = referenceV4FeatureCache.get(pixels);
      if (cached && cached.width === width && cached.height === height) return cached;
    }
    const pixelCount = Math.min(width * height, Math.floor(pixels.length / 4));
    const rgb = new Float32Array(pixelCount * 3);
    const foreground = new Uint8Array(pixelCount);
    const maskedLuma = new Float32Array(pixelCount);
    const foregroundRgbHistograms = [
      new Uint32Array(256),
      new Uint32Array(256),
      new Uint32Array(256),
    ];
    const foregroundRgbSums = [0, 0, 0];
    const foregroundLuma = [];
    let foregroundCount = 0;
    for (let index = 0; index < pixelCount; index += 1) {
      const sourceIndex = index * 4;
      const alpha = pixels[sourceIndex + 3];
      const redByte = compositeChannelOnWhite(pixels[sourceIndex], alpha);
      const greenByte = compositeChannelOnWhite(pixels[sourceIndex + 1], alpha);
      const blueByte = compositeChannelOnWhite(pixels[sourceIndex + 2], alpha);
      const red = redByte / 255.0;
      const green = greenByte / 255.0;
      const blue = blueByte / 255.0;
      const rgbIndex = index * 3;
      rgb[rgbIndex] = red;
      rgb[rgbIndex + 1] = green;
      rgb[rgbIndex + 2] = blue;
      const isForeground = Math.max(
        Math.abs(red - 1),
        Math.abs(green - 1),
        Math.abs(blue - 1),
      ) > (8 / 255.0);
      if (!isForeground) continue;
      foreground[index] = 1;
      foregroundCount += 1;
      const luma = 0.2126 * red + 0.7152 * green + 0.0722 * blue;
      maskedLuma[index] = luma;
      foregroundRgbHistograms[0][redByte] += 1;
      foregroundRgbHistograms[1][greenByte] += 1;
      foregroundRgbHistograms[2][blueByte] += 1;
      foregroundRgbSums[0] += red;
      foregroundRgbSums[1] += green;
      foregroundRgbSums[2] += blue;
      foregroundLuma.push(luma);
    }
    const prepared = {
      width,
      height,
      pixelCount,
      rgb,
      foreground,
      foregroundCount,
      foregroundRgbHistograms,
      foregroundRgbSums,
      foregroundLuma,
      maskedLuma,
    };
    if (cacheReference) {
      prepared.foregroundLumaSorted = [...foregroundLuma].sort((a, b) => a - b);
      referenceV4FeatureCache.set(pixels, prepared);
    }
    return prepared;
  }

  function erodeBinaryMask(mask, width, height, iterations) {
    let current = mask;
    for (let round = 0; round < iterations; round += 1) {
      const next = new Uint8Array(mask.length);
      for (let y = 1; y < height - 1; y += 1) {
        const row = y * width;
        for (let x = 1; x < width - 1; x += 1) {
          const index = row + x;
          let keep = 1;
          for (let dy = -1; dy <= 1 && keep; dy += 1) {
            const neighborRow = index + dy * width;
            for (let dx = -1; dx <= 1; dx += 1) {
              if (current[neighborRow + dx] === 0) {
                keep = 0;
                break;
              }
            }
          }
          next[index] = keep;
        }
      }
      current = next;
    }
    return current;
  }

  function exactColorDistributionError(referencePrepared, candidatePrepared) {
    const quantiles = [0.10, 0.25, 0.50, 0.75, 0.90];
    let quantileError = 0;
    let meanError = 0;
    for (let channel = 0; channel < 3; channel += 1) {
      for (const q of quantiles) {
        quantileError += Math.abs(
          histogramLinearQuantile(
            candidatePrepared.foregroundRgbHistograms[channel],
            candidatePrepared.foregroundCount,
            q,
          )
          - histogramLinearQuantile(
            referencePrepared.foregroundRgbHistograms[channel],
            referencePrepared.foregroundCount,
            q,
          ),
        );
      }
      meanError += Math.abs(
        candidatePrepared.foregroundRgbSums[channel] / Math.max(1, candidatePrepared.foregroundCount)
        - referencePrepared.foregroundRgbSums[channel] / Math.max(1, referencePrepared.foregroundCount)
      );
    }
    quantileError /= quantiles.length * 3;
    meanError /= 3;
    return clamp01(0.70 * quantileError + 0.30 * meanError);
  }

  function exactMultiscaleLuminanceError(reference, candidate, core, width, height) {
    const scales = [[1, 0.50], [2, 0.25], [4, 0.15], [8, 0.10]];
    let weightedError = 0;
    let weightSum = 0;
    for (const [block, weight] of scales) {
      let errorSum = 0;
      let count = 0;
      const pooledWidth = Math.floor(width / block);
      const pooledHeight = Math.floor(height / block);
      for (let by = 0; by < pooledHeight; by += 1) {
        for (let bx = 0; bx < pooledWidth; bx += 1) {
          let maskSum = 0;
          let referenceSum = 0;
          let candidateSum = 0;
          for (let dy = 0; dy < block; dy += 1) {
            const row = (by * block + dy) * width + bx * block;
            for (let dx = 0; dx < block; dx += 1) {
              const index = row + dx;
              maskSum += core[index];
              referenceSum += reference[index];
              candidateSum += candidate[index];
            }
          }
          const area = block * block;
          if (maskSum / area < 0.75) continue;
          errorSum += Math.abs(candidateSum - referenceSum) / area;
          count += 1;
        }
      }
      if (count <= 0) continue;
      weightedError += weight * errorSum / count;
      weightSum += weight;
    }
    return clamp01(weightedError / Math.max(weightSum, 1e-8));
  }

  function exactDetailError(reference, candidate, core, width, height) {
    const interior = erodeBinaryMask(core, width, height, 1);
    let errorSum = 0;
    let count = 0;
    for (let y = 1; y < height - 1; y += 1) {
      const row = y * width;
      for (let x = 1; x < width - 1; x += 1) {
        const index = row + x;
        if (interior[index] === 0) continue;
        const referenceX = 0.5 * (reference[index + 1] - reference[index - 1]);
        const referenceY = 0.5 * (reference[index + width] - reference[index - width]);
        const candidateX = 0.5 * (candidate[index + 1] - candidate[index - 1]);
        const candidateY = 0.5 * (candidate[index + width] - candidate[index - width]);
        errorSum += Math.abs(
          Math.hypot(candidateX, candidateY) - Math.hypot(referenceX, referenceY),
        );
        count += 1;
      }
    }
    return clamp01(2 * errorSum / Math.max(count, 1));
  }

  function exactHighlightError(referenceValues, candidateValues, preparedReferenceSorted) {
    const referenceSorted = preparedReferenceSorted || [...referenceValues].sort((a, b) => a - b);
    const candidateSorted = [...candidateValues].sort((a, b) => a - b);
    const referenceThreshold = Math.max(0.65, linearQuantile(referenceSorted, 0.90));
    const candidateThreshold = Math.max(0.65, linearQuantile(candidateSorted, 0.90));
    const referenceArea = fractionAtLeast(referenceValues, referenceThreshold);
    const candidateArea = fractionAtLeast(candidateValues, candidateThreshold);
    const areaError = Math.abs(candidateArea - referenceArea) / Math.max(referenceArea, 0.02);
    const peakError = Math.abs(
      linearQuantile(candidateSorted, 0.99) - linearQuantile(referenceSorted, 0.99),
    );
    return clamp01(0.60 * areaError + 0.40 * peakError);
  }

  function accumulateChromaOpponent(sums, red, green, blue) {
    sums[0] += Math.max(red, green, blue) - Math.min(red, green, blue);
    sums[1] += (2 * red - green - blue) / 2;
    sums[2] += green - blue;
  }

  function linearQuantile(sorted, q) {
    if (sorted.length === 0) return 0;
    const index = (sorted.length - 1) * q;
    const low = Math.floor(index);
    const high = Math.ceil(index);
    if (low === high) return sorted[low];
    const fraction = index - low;
    return sorted[low] * (1 - fraction) + sorted[high] * fraction;
  }

  function histogramLinearQuantile(histogram, count, q) {
    if (count <= 0) return 0;
    const index = (count - 1) * q;
    const lowRank = Math.floor(index);
    const highRank = Math.ceil(index);
    let cumulative = 0;
    let lowValue = 0;
    let highValue = 0;
    let foundLow = false;
    for (let value = 0; value < histogram.length; value += 1) {
      cumulative += histogram[value];
      if (!foundLow && cumulative > lowRank) {
        lowValue = value / 255.0;
        foundLow = true;
      }
      if (cumulative > highRank) {
        highValue = value / 255.0;
        break;
      }
    }
    if (lowRank === highRank) return lowValue;
    const fraction = index - lowRank;
    return lowValue * (1 - fraction) + highValue * fraction;
  }

  function fractionAtLeast(values, threshold) {
    if (values.length === 0) return 0;
    let count = 0;
    for (const value of values) {
      if (value >= threshold) count += 1;
    }
    return count / values.length;
  }

  function clamp01(value) {
    return Math.max(0, Math.min(1, Number(value) || 0));
  }

  async function renderAndScore(command) {
    const frozenScripts = freezeSceneScripts(command, runtime.target || runtime.scene);
    const frozenAnimators = freezeAnimators(command, runtime.target || runtime.scene);
    try {
      if (frozenAnimators.length > 0) {
        const startupFrames = configuredAnimationMode(command) === "disabled"
          ? 0
          : Math.max(1, resolveAnimationFreezeSettleFrames(command));
        await waitFrames(startupFrames);
        pauseAnimators(frozenAnimators);
      }
      const materialPatch = applyMaterialPatch(command);
      const refs = command.browser_score && Array.isArray(command.browser_score.reference_images)
        ? command.browser_score.reference_images
        : [];
      const metric = command.browser_score && command.browser_score.metric || "runtime_laya_canvas_mae";
      const useMaterialComponentsV5Strict = metric === "cross_engine_foreground_components_v5_strict_core";
      const useMaterialComponentsV4 = useMaterialComponentsV5Strict || metric === "cross_engine_foreground_components_v4";
      const useMaterialComponentsV3 = useMaterialComponentsV4 || metric === "cross_engine_foreground_components_v3";
      const useWhiteArtifactScore = useMaterialComponentsV3 || metric === "cross_engine_foreground_components_v2";
      const views = command.views && command.views.length ? command.views : [{ view_id: "v000_yaw0_pitch0", yaw: 0, pitch: 0 }];
      const scoredViews = [];
      for (let i = 0; i < views.length; i += 1) {
        const view = views[i];
        drawView(command, view);
        applyFixedAnimations(command, frozenAnimators);
        await waitFrames(frozenAnimators.length > 0 ? resolveAnimationFreezeSettleFrames(command) : resolveSettleFrames(command));
        drawView(command, view);
        applyFixedAnimations(command, frozenAnimators);
        await waitFrames(1);
        pauseAnimators(frozenAnimators);
        const staged = stageCanvas(command);
        if (command && command.alpha_source === "silhouette_mask") {
          applySilhouetteAlpha(staged.pixels, await cachedSilhouetteAlpha(command, view));
        }
        const background = visualBackgroundColor(command);
        const scoreCandidatePixels = staged.pixels;
        const reference = refs.find((item) => item.view_id === view.view_id) || refs[i];
        const referencePixels = await loadReferencePixels(reference, command);
        const score = referencePixels
          ? scorePixels(
              scoreCandidatePixels,
              referencePixels,
              command,
              background,
              staged.width,
              staged.height,
            )
          : { diff_score: 1, fit_score: 0, rgb_mae: 1, alpha_mae: 1 };
        if (shouldEmitCaptureArtifacts(command)) {
          const artifactCanvas = command && command.preserve_artifact_alpha === true
            ? canvasFromPixels(staged.pixels, staged.width, staged.height)
            : canvasOnBackground(
                canvasFromPixels(staged.pixels, staged.width, staged.height),
                background,
              );
          await postCaptureResult(command, view, artifactCanvas, score);
        }
        scoredViews.push({
          view_id: view.view_id || `v${i}`,
          score_implementation: useWhiteArtifactScore
            ? (useMaterialComponentsV5Strict
              ? "cross_engine_components_v5_strict_canvas_core_v1"
              : useMaterialComponentsV4
              ? "cross_engine_components_v4_python_parity_v1"
              : useMaterialComponentsV3
              ? "cross_engine_components_v3_raw_rgba_white_composite_v3"
              : "cross_engine_components_v2_raw_rgba_white_composite_v2")
            : "legacy_raw_capture_pixels",
          ...score,
        });
      }
      const meanFitScore = scoredViews.reduce((sum, item) => sum + item.fit_score, 0) / Math.max(1, scoredViews.length);
      let fitScore = meanFitScore;
      if (useWhiteArtifactScore && scoredViews.length > 0) {
        const orderedScores = scoredViews.map((item) => item.fit_score).sort((a, b) => a - b);
        const p10Score = linearQuantile(orderedScores, 0.10);
        fitScore = 0.70 * meanFitScore + 0.20 * p10Score + 0.10 * orderedScores[0];
      }
      const diffScore = 1 - fitScore;
      const residualFeatures = [];
      for (const view of scoredViews) {
        if (Array.isArray(view.residual_features)) residualFeatures.push(...view.residual_features);
      }
      return {
        enabled: true,
        metric,
        fit_score: fitScore,
        score: fitScore,
        diff_score: diffScore,
        renderer: {
          mode: runtime.mode,
          scene_url: sceneUrl,
          project_root: projectRoot,
        },
        score_implementation: useWhiteArtifactScore
          ? (useMaterialComponentsV5Strict
            ? "cross_engine_components_v5_strict_canvas_core_v1"
            : useMaterialComponentsV4
            ? "cross_engine_components_v4_python_parity_v1"
            : useMaterialComponentsV3
            ? "cross_engine_components_v3_raw_rgba_white_composite_v3"
            : "cross_engine_components_v2_raw_rgba_white_composite_v2")
          : "legacy_raw_capture_pixels",
        material_patch: materialPatch,
        views: scoredViews,
        structured_residual_features: {
          profile: useMaterialComponentsV3
            ? (useMaterialComponentsV5Strict
              ? "signed_rgb_grid_sketch_chroma_v5_strict_canvas_core"
              : useMaterialComponentsV4
              ? "signed_rgb_grid_sketch_chroma_v4_python_parity"
              : "signed_rgb_grid_sketch_chroma_v3")
            : "signed_rgb_grid_sketch_v2",
          grid_size: scoredViews.length > 0 ? Number(scoredViews[0].residual_grid_size || 4) : 4,
          sketch_size: scoredViews.length > 0 ? Number(scoredViews[0].residual_sketch_size || 128) : 128,
          feature_count: residualFeatures.length,
          features: residualFeatures,
        },
        summary: {
          fit_score: fitScore,
          diff_score: diffScore,
          mean_fit_score: meanFitScore,
          aggregation: useWhiteArtifactScore
            ? "0.70*mean + 0.20*p10 + 0.10*min"
            : "mean",
          render_width: width,
          render_height: height,
          readback_width: scoreReadbackDimensions(command).width,
          readback_height: scoreReadbackDimensions(command).height,
        },
      };
    } finally {
      if (command.restore_animators_after_capture !== false) {
        restoreAnimators(frozenAnimators);
      }
      if (command.restore_scene_scripts_after_capture !== false) {
        restoreSceneScripts(frozenScripts);
      }
    }
  }

  async function pollOnce() {
    if (busy) return;
    const response = await fetch(`${serverBaseUrl}/material-fit/capture-command?last_nonce=${encodeURIComponent(lastNonce)}`);
    if (!response.ok) return;
    const command = commandWithProfileDefaults(await response.json());
    if (!command || command.enabled === false || !command.nonce || command.nonce === lastNonce) return;
    busy = true;
    try {
      lastNonce = command.nonce;
      const browserScore = await renderAndScore(command);
      await fetch(`${serverBaseUrl}/material-fit/capture-score`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nonce: command.nonce, browser_score: browserScore }),
      });
    } catch (error) {
      await fetch(`${serverBaseUrl}/material-fit/capture-log`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ level: "error", message: String(error && error.stack || error) }),
      }).catch(() => {});
    } finally {
      busy = false;
    }
  }

  window.__MATERIAL_FIT_READY__ = true;
  window.__MATERIAL_FIT_RENDERER__ = {
    mode: runtime.mode,
    sceneUrl,
    projectRoot,
    assetId: assetProfile.asset_id || "",
    profileUrl: assetProfileUrl,
    animationMode: configuredAnimationMode(null),
    targetName: runtime.target && runtime.target.name,
    materialTargetName: runtime.materialTarget && runtime.materialTarget.name,
    cameraName: runtime.camera && runtime.camera.name,
    frame: runtime.frame ? {
      center: [runtime.frame.center.x, runtime.frame.center.y, runtime.frame.center.z],
      extent: [runtime.frame.extent.x, runtime.frame.extent.y, runtime.frame.extent.z],
      radius: runtime.frame.radius,
    } : null,
  };
  setInterval(() => { pollOnce().catch(() => {}); }, 10);
})();
</script>
</body>
</html>
