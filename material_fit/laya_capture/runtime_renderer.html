<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Material Fit Runtime Renderer</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  </style>
</head>
<body>
<script>
(async function bootstrap() {
  const params = new URLSearchParams(location.search);
  const engineRoot = params.get("engineRoot") || "";
  const projectRoot = params.get("projectRoot") || "";
  const sceneUrl = params.get("scene") || "";
  const assetManifestUrl = params.get("assetManifest") || "";
  const serverBaseUrl = params.get("server") || "http://127.0.0.1:8787";
  const width = Number(params.get("width") || "320");
  const height = Number(params.get("height") || "240");
  const startupDebugMaterial = params.get("debugMaterial") === "1" || params.get("debugMaterial") === "true";

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = src;
      script.onload = resolve;
      script.onerror = () => reject(new Error("script load failed: " + src));
      document.head.appendChild(script);
    });
  }

  function joinUrl(root, path) {
    if (!root) return path;
    return root.replace(/\/$/, "") + "/" + path.replace(/^\//, "");
  }

  await loadScript(joinUrl(engineRoot, "laya.core.js"));
  await loadScript(joinUrl(engineRoot, "laya.webgl_2D.js"));
  await loadScript(joinUrl(engineRoot, "laya.d3.js"));
  await loadScript(joinUrl(engineRoot, "laya.webgl_3D.js"));
  await loadOptionalEngineScripts([
    "laya.ani.js",
    "laya.particleCommon.js",
    "laya.particle3D.js",
    "laya.trailCommon.js",
    "laya.trail3D.js",
  ]);

  const initResult = Laya.init(width, height);
  if (initResult && typeof initResult.then === "function") {
    await initResult;
  }
  Laya.stage.bgColor = "#000000";
  if (Laya.stage.scaleMode !== undefined) {
    Laya.stage.scaleMode = "noscale";
  }

  let lastNonce = "";
  let busy = false;
  let lastColor = [0.2, 0.6, 1.0, 1.0];

  await loadProjectBundles();
  await installAssetManifest();
  const runtime = await createRuntimeScene();

  async function loadProjectBundles() {
    if (!projectRoot) return;
    for (const bundle of ["bin/js/bundles/bundle.js"]) {
      try {
        await loadScript(joinUrl(projectRoot, bundle));
        console.log("[material-fit] loaded project bundle: " + bundle);
      } catch (error) {
        console.warn("[material-fit] optional project bundle not loaded: " + bundle + " " + error);
      }
    }
  }

  async function loadOptionalEngineScripts(names) {
    for (const name of names) {
      try {
        await loadScript(joinUrl(engineRoot, name));
        console.log("[material-fit] loaded optional engine script: " + name);
      } catch (error) {
        console.warn("[material-fit] optional engine script not loaded: " + name);
      }
    }
  }

  async function installAssetManifest() {
    if (!assetManifestUrl || !Laya.AssetDb || !Laya.AssetDb.inst) return;
    const response = await fetch(assetManifestUrl);
    if (!response.ok) {
      console.warn("[material-fit] asset manifest not loaded: " + response.status);
      return;
    }
    const manifest = await response.json();
    const uuidMap = manifest && manifest.uuidMap || {};
    const shaderNameMap = manifest && manifest.shaderNameMap || {};
    const originalResolve = Laya.AssetDb.inst.resolveURL.bind(Laya.AssetDb.inst);
    if (Laya.LayaEnv) {
      Laya.LayaEnv.isPreview = true;
    }
    Laya.AssetDb.inst.uuidMap = Object.assign({}, Laya.AssetDb.inst.uuidMap || {}, uuidMap);
    Laya.AssetDb.inst.shaderNameMap = Object.assign({}, Laya.AssetDb.inst.shaderNameMap || {}, shaderNameMap);
    Laya.AssetDb.inst.UUID_to_URL = (uuid) => uuidMap[uuid] || null;
    Laya.AssetDb.inst.UUID_to_URL_async = (uuid) => Promise.resolve(uuidMap[uuid] || null);
    Laya.AssetDb.inst.shaderName_to_URL = (shaderName) => shaderNameMap[shaderName] || null;
    Laya.AssetDb.inst.shaderName_to_URL_async = (shaderName) => Promise.resolve(shaderNameMap[shaderName] || null);
    Laya.AssetDb.inst.resolveURL = (url, onResolve) => {
      if (url && url.startsWith("res://")) {
        const resolved = uuidMap[url.substring(6)] || null;
        if (onResolve) onResolve(resolved);
        return Promise.resolve(resolved);
      }
      return originalResolve(url, onResolve);
    };
    console.log("[material-fit] installed asset manifest entries=" + Object.keys(uuidMap).length + " shaders=" + Object.keys(shaderNameMap).length);
  }

  async function createRuntimeScene() {
    if (sceneUrl) {
      try {
        if (/\.lh(?:$|\?)/i.test(sceneUrl)) {
          return await createPrefabRuntimeScene(sceneUrl);
        }
        const scene = await Laya.Scene.open(sceneUrl, false);
        await waitFrames(4);
        const sceneRoot = scene.scene3D || scene;
        const camera = findFirstCamera(sceneRoot) || findNodeByName(sceneRoot, "Capture Camera");
        const target = findNodeByName(sceneRoot, "model");
        if (!camera || !target) {
          throw new Error(`scene loaded but camera/target missing camera=${!!camera} target=${!!target}`);
        }
        console.log("[material-fit] loaded scene: " + sceneUrl);
        const frame = frameCamera(camera, target);
        return { mode: "scene", scene: sceneRoot, camera, target, fallbackMaterial: null, frame };
      } catch (error) {
        console.error("[material-fit] scene load failed, falling back to cube: " + (error && error.stack || error));
      }
    }

    const scene = new Laya.Scene3D();
    Laya.stage.addChild(scene);
    const camera = new Laya.Camera(0, 0.1, 100);
    scene.addChild(camera);
    camera.transform.position = new Laya.Vector3(0, 0, 4);
    camera.transform.lookAt(new Laya.Vector3(0, 0, 0), new Laya.Vector3(0, 1, 0));
    const target = new Laya.MeshSprite3D(Laya.PrimitiveMesh.createBox(1.4, 1.4, 1.4));
    target.name = "model";
    scene.addChild(target);
    const fallbackMaterial = new Laya.UnlitMaterial();
    fallbackMaterial.albedoColor = new Laya.Color(lastColor[0], lastColor[1], lastColor[2], lastColor[3]);
    target.meshRenderer.material = fallbackMaterial;
    console.log("[material-fit] using fallback cube renderer");
    const frame = frameCamera(camera, target);
    return { mode: "fallback_cube", scene, camera, target, fallbackMaterial, frame };
  }

  async function createPrefabRuntimeScene(prefabUrl) {
    const scene = new Laya.Scene3D();
    Laya.stage.addChild(scene);
    const camera = new Laya.Camera(0, 0.1, 100);
    camera.name = "Capture Camera";
    scene.addChild(camera);
    let prefab = await Laya.loader.load(prefabUrl);
    prefab = normalizeLoadedResource(prefabUrl, prefab);
    if (!prefab) {
      throw new Error("prefab load returned empty: " + prefabUrl);
    }
    console.log("[material-fit] prefab resource type: " + resourceTypeName(prefab));
    scene.addChild(prefab);
    if (startupDebugMaterial) {
      applyDebugMaterials(prefab);
    }
    await waitFrames(8);
    const target = findNodeByName(prefab, "model") || prefab;
    const frame = frameCamera(camera, target);
    console.log("[material-fit] loaded prefab: " + prefabUrl);
    return { mode: "prefab", scene, camera, target, fallbackMaterial: null, frame };
  }

  function normalizeLoadedResource(url, resource) {
    let value = resource;
    if (Array.isArray(value)) value = value[0];
    if (value && typeof value._setParent === "function") return value;
    const cached = Laya.loader && typeof Laya.loader.getRes === "function" ? Laya.loader.getRes(url) : null;
    if (Array.isArray(cached)) value = cached[0];
    else if (cached) value = cached;
    if (value && typeof value._setParent === "function") return value;
    if (value && typeof value.create === "function") return value.create();
    return value;
  }

  function resourceTypeName(value) {
    if (!value) return "null";
    const ctor = value.constructor && value.constructor.name || typeof value;
    return ctor + " keys=" + Object.keys(value).slice(0, 8).join(",");
  }

  function frameCamera(camera, target) {
    const center = new Laya.Vector3(0, 0, 0);
    const extent = new Laya.Vector3(2, 2, 2);
    const bounds = aggregateBounds(target);
    if (bounds) {
      center.x = bounds.center.x;
      center.y = bounds.center.y;
      center.z = bounds.center.z;
      extent.x = bounds.extent.x;
      extent.y = bounds.extent.y;
      extent.z = bounds.extent.z;
    }
    const radius = Math.max(1, extent.x, extent.y, extent.z) * 2.4;
    camera.transform.position = new Laya.Vector3(center.x, center.y + radius * 0.15, center.z + radius);
    camera.transform.lookAt(center, new Laya.Vector3(0, 1, 0));
    if ("orthographic" in camera) {
      camera.orthographic = true;
      camera.orthographicVerticalSize = Math.max(2, Math.max(extent.x, extent.y) * 3.1);
    }
    return { center, extent, radius };
  }

  function aggregateBounds(root) {
    let minX = Infinity;
    let minY = Infinity;
    let minZ = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;
    let maxZ = -Infinity;
    walk(root, (node) => {
      const renderer = node.meshRenderer || node.skinnedMeshRenderer || node.renderer || node._renderNode;
      const bounds = renderer && renderer.bounds;
      const center = bounds && (bounds.center || (typeof bounds.getCenter === "function" ? bounds.getCenter() : null));
      const extent = bounds && (bounds.extents || bounds.extent || (typeof bounds.getExtent === "function" ? bounds.getExtent() : null));
      if (!center || !extent) return;
      minX = Math.min(minX, center.x - extent.x);
      minY = Math.min(minY, center.y - extent.y);
      minZ = Math.min(minZ, center.z - extent.z);
      maxX = Math.max(maxX, center.x + extent.x);
      maxY = Math.max(maxY, center.y + extent.y);
      maxZ = Math.max(maxZ, center.z + extent.z);
    });
    if (!Number.isFinite(minX)) return null;
    return {
      center: new Laya.Vector3((minX + maxX) / 2, (minY + maxY) / 2, (minZ + maxZ) / 2),
      extent: new Laya.Vector3((maxX - minX) / 2, (maxY - minY) / 2, (maxZ - minZ) / 2),
    };
  }

  function findNodeByName(root, name) {
    if (!root || !name) return null;
    if (root.name === name) return root;
    const children = childNodes(root);
    for (const child of children) {
      const found = findNodeByName(child, name);
      if (found) return found;
    }
    return null;
  }

  function findFirstCamera(root) {
    if (!root) return null;
    if (root instanceof Laya.Camera) return root;
    const children = childNodes(root);
    for (const child of children) {
      const found = findFirstCamera(child);
      if (found) return found;
    }
    return null;
  }

  function walk(root, visitor) {
    if (!root) return;
    visitor(root);
    for (const child of childNodes(root)) {
      walk(child, visitor);
    }
  }

  function childNodes(root) {
    if (!root) return [];
    if (Array.isArray(root._children)) return root._children;
    const count = typeof root.numChildren === "number" ? root.numChildren : 0;
    const out = [];
    for (let i = 0; i < count; i += 1) {
      out.push(root.getChildAt(i));
    }
    return out;
  }

  function waitFrames(count) {
    return new Promise((resolve) => {
      function step(remaining) {
        if (remaining <= 0) {
          resolve();
          return;
        }
        requestAnimationFrame(() => step(remaining - 1));
      }
      step(Math.max(1, count || 1));
    });
  }

  function numberOr(value, fallback) {
    const parsed = Number(value);
    return Number.isFinite(parsed) ? parsed : fallback;
  }

  function collectMaterials(root) {
    const out = [];
    walk(root, (node) => {
      const sources = collectNodeRenderableSources(node);
      for (const source of sources) {
        const materials = source && (source.sharedMaterials || source.materials || source._materials || (source.sharedMaterial ? [source.sharedMaterial] : null));
        if (!materials) continue;
        for (const material of materials) {
          if (material && out.indexOf(material) < 0) out.push(material);
        }
      }
    });
    if (runtime.fallbackMaterial && out.indexOf(runtime.fallbackMaterial) < 0) {
      out.push(runtime.fallbackMaterial);
    }
    return out;
  }

  function collectRenderableSources(root) {
    const out = [];
    walk(root, (node) => {
      const sources = collectNodeRenderableSources(node);
      for (const source of sources) {
        if (source && out.indexOf(source) < 0) out.push(source);
      }
    });
    return out;
  }

  function collectNodeRenderableSources(node) {
    if (!node) return [];
    const out = [node.meshRenderer, node.skinnedMeshRenderer, node.renderer, node._renderNode];
    if (typeof node.getComponent === "function") {
      for (const type of [Laya.MeshRenderer, Laya.SkinnedMeshRenderer, Laya.SimpleSkinnedMeshRenderer]) {
        if (!type) continue;
        try {
          const component = node.getComponent(type);
          if (component) out.push(component);
        } catch {
          // Some Laya builds throw when a component class is absent or not registered.
        }
      }
    }
    for (const list of [node._components, node._component, node.components]) {
      if (!Array.isArray(list)) continue;
      for (const component of list) {
        const ctorName = component && component.constructor && component.constructor.name || "";
        if (/Renderer/i.test(ctorName)) out.push(component);
      }
    }
    return out.filter(Boolean);
  }

  function makeDebugMaterial(index) {
    const colors = [
      [0.95, 0.35, 0.18, 1],
      [0.18, 0.65, 0.95, 1],
      [0.55, 0.9, 0.25, 1],
      [0.95, 0.8, 0.18, 1],
    ];
    const rgba = colors[index % colors.length];
    const material = new Laya.UnlitMaterial();
    material.albedoColor = new Laya.Color(rgba[0], rgba[1], rgba[2], rgba[3]);
    return material;
  }

  function applyDebugMaterials(root) {
    const sources = collectRenderableSources(root);
    for (let i = 0; i < sources.length; i += 1) {
      const material = makeDebugMaterial(i);
      const source = sources[i];
      try {
        if ("material" in source) source.material = material;
        if ("sharedMaterial" in source) source.sharedMaterial = material;
        if ("materials" in source) source.materials = [material];
        if ("sharedMaterials" in source) source.sharedMaterials = [material];
      } catch (error) {
        console.warn("[material-fit] debug material assignment failed: " + error);
      }
    }
    console.log("[material-fit] applied debug materials renderables=" + sources.length);
  }

  function setShaderDataValue(material, name, value, kind) {
    const shaderData = material && material.shaderData;
    if (!shaderData || !Laya.Shader3D || typeof Laya.Shader3D.propertyNameToID !== "function") return;
    const id = Laya.Shader3D.propertyNameToID(name);
    if (kind === "color" && typeof shaderData.setColor === "function") {
      shaderData.setColor(id, value);
    } else if (kind === "number" && typeof shaderData.setNumber === "function") {
      shaderData.setNumber(id, value);
    }
  }

  function setMaterialValue(material, name, value) {
    if (!material) return;
    if (Array.isArray(value) && value.length >= 3) {
      const color = new Laya.Color(
        Math.max(0, Math.min(1, numberOr(value[0], 0))),
        Math.max(0, Math.min(1, numberOr(value[1], 0))),
        Math.max(0, Math.min(1, numberOr(value[2], 0))),
        Math.max(0, Math.min(1, numberOr(value[3], 1))),
      );
      if ("albedoColor" in material) {
        material.albedoColor = color;
      }
      setShaderDataValue(material, name, color, "color");
      return;
    }
    if (typeof value === "number" || typeof value === "boolean") {
      setShaderDataValue(material, name, typeof value === "boolean" ? (value ? 1 : 0) : value, "number");
    }
  }

  function applyMaterialPatch(command) {
    if (command && (command.debug_material || command.force_debug_material)) {
      applyDebugMaterials(runtime.target);
      return;
    }

    const values = command && command.material_patch && command.material_patch.values;
    if (!values || typeof values !== "object") return;

    const vector = [values.u_BaseColor, values.u_Color, values.albedoColor, values.color]
      .find((item) => Array.isArray(item) && item.length >= 3);
    if (vector) {
      lastColor = [
        Math.max(0, Math.min(1, numberOr(vector[0], lastColor[0]))),
        Math.max(0, Math.min(1, numberOr(vector[1], lastColor[1]))),
        Math.max(0, Math.min(1, numberOr(vector[2], lastColor[2]))),
        Math.max(0, Math.min(1, numberOr(vector[3], lastColor[3]))),
      ];
    }

    const scalar = numberOr(values.u_Metallic ?? values.u_Roughness ?? values.value, NaN);
    if (Number.isFinite(scalar) && !vector) {
      lastColor = [
        Math.max(0, Math.min(1, scalar)),
        Math.max(0, Math.min(1, 1 - scalar)),
        Math.max(0, Math.min(1, 0.25 + 0.5 * scalar)),
        1,
      ];
    }

    const materials = collectMaterials(runtime.target);
    for (const material of materials) {
      for (const [name, value] of Object.entries(values)) {
        setMaterialValue(material, name, value);
      }
    }
  }

  function drawView(command, view) {
    const yaw = numberOr(view && view.yaw, 0);
    const pitch = numberOr(view && view.pitch, 0);
    if (command && Number.isFinite(Number(command.orthographic_vertical_size)) && "orthographicVerticalSize" in runtime.camera) {
      runtime.camera.orthographic = true;
      runtime.camera.orthographicVerticalSize = Number(command.orthographic_vertical_size);
    }
    const baseYaw = numberOr(command.target_base_yaw, 0);
    const basePitch = numberOr(command.target_base_pitch, 0);
    const yawSign = numberOr(command.target_yaw_sign, -1);
    const pitchSign = numberOr(command.target_pitch_sign, -1);
    if (command && command.capture_mode === "orbit_camera") {
      runtime.target.transform.localRotationEuler = new Laya.Vector3(
        basePitch,
        baseYaw,
        numberOr(command.target_base_roll, 0),
      );
      orbitCamera(runtime.camera, runtime.frame, yaw, pitch, command);
    } else {
      runtime.target.transform.localRotationEuler = new Laya.Vector3(
        basePitch + pitchSign * pitch,
        baseYaw + yawSign * yaw,
        numberOr(command.target_base_roll, 0),
      );
    }
    if (runtime.fallbackMaterial) {
      runtime.fallbackMaterial.albedoColor = new Laya.Color(lastColor[0], lastColor[1], lastColor[2], lastColor[3]);
    }
  }

  function orbitCamera(camera, frame, yaw, pitch, command) {
    const center = frame && frame.center || new Laya.Vector3(0, 0, 0);
    const radius = numberOr(command && command.camera_distance, frame && frame.radius || 4);
    const yawRad = (numberOr(command && command.yaw_offset, 0) + yaw) * Math.PI / 180;
    const pitchRad = (numberOr(command && command.pitch_offset, 0) + pitch) * Math.PI / 180;
    const cosPitch = Math.cos(pitchRad);
    const position = new Laya.Vector3(
      center.x + Math.sin(yawRad) * cosPitch * radius,
      center.y + Math.sin(pitchRad) * radius + radius * 0.12,
      center.z + Math.cos(yawRad) * cosPitch * radius,
    );
    camera.transform.position = position;
    camera.transform.lookAt(center, new Laya.Vector3(0, 1, 0));
  }

  function stageCanvas() {
    const canvas = document.querySelector("canvas");
    if (!canvas) throw new Error("Laya canvas not found");
    const out = document.createElement("canvas");
    out.width = width;
    out.height = height;
    const ctx = out.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(canvas, 0, 0, width, height);
    return { canvas: out, pixels: ctx.getImageData(0, 0, width, height).data };
  }

  async function canvasToPngBase64(canvas) {
    const blob = await new Promise((resolve, reject) => {
      canvas.toBlob((value) => value ? resolve(value) : reject(new Error("PNG encoding failed")), "image/png");
    });
    const bytes = new Uint8Array(await blob.arrayBuffer());
    let binary = "";
    const chunkSize = 0x8000;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    }
    return btoa(binary);
  }

  async function postCaptureResult(command, view, canvas, score) {
    if (command.return_images === false) return;
    const viewId = view.view_id || "view";
    const fileName = view.file_name || `${viewId}.png`;
    await fetch(`${serverBaseUrl}/material-fit/capture-result`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        nonce: command.nonce,
        view_id: viewId,
        file_name: fileName,
        png_base64: await canvasToPngBase64(canvas),
        score,
        renderer: {
          mode: runtime.mode,
          scene_url: sceneUrl,
          project_root: projectRoot,
        },
      }),
    });
  }

  async function loadReferencePixels(reference) {
    if (!reference || !reference.url) return null;
    const response = await fetch(reference.url);
    if (!response.ok) throw new Error("reference fetch failed: " + response.status);
    const blob = await response.blob();
    const bitmap = await createImageBitmap(blob);
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(bitmap, 0, 0, width, height);
    const pixels = ctx.getImageData(0, 0, width, height).data;
    if (bitmap.close) bitmap.close();
    return pixels;
  }

  function scorePixels(candidate, reference) {
    let diff = 0;
    const n = Math.min(candidate.length, reference.length);
    for (let i = 0; i < n; i += 4) {
      diff += Math.abs(candidate[i] - reference[i]);
      diff += Math.abs(candidate[i + 1] - reference[i + 1]);
      diff += Math.abs(candidate[i + 2] - reference[i + 2]);
      diff += Math.abs(candidate[i + 3] - reference[i + 3]);
    }
    const mae = diff / Math.max(1, (n / 4) * 4) / 255;
    const fitScore = Math.max(0, Math.min(1, 1 - mae));
    return { diff_score: mae, fit_score: fitScore, rgb_mae: mae, alpha_mae: mae };
  }

  async function renderAndScore(command) {
    applyMaterialPatch(command);
    const refs = command.browser_score && Array.isArray(command.browser_score.reference_images)
      ? command.browser_score.reference_images
      : [];
    const views = command.views && command.views.length ? command.views : [{ view_id: "v000_yaw0_pitch0", yaw: 0, pitch: 0 }];
    const scoredViews = [];
    for (let i = 0; i < views.length; i += 1) {
      const view = views[i];
      drawView(command, view);
      await waitFrames(Number(command.settle_frames || 2));
      const staged = stageCanvas();
      const reference = refs.find((item) => item.view_id === view.view_id) || refs[i];
      const referencePixels = await loadReferencePixels(reference);
      const score = referencePixels
        ? scorePixels(staged.pixels, referencePixels)
        : { diff_score: 1, fit_score: 0, rgb_mae: 1, alpha_mae: 1 };
      await postCaptureResult(command, view, staged.canvas, score);
      scoredViews.push({ view_id: view.view_id || `v${i}`, ...score });
    }
    const fitScore = scoredViews.reduce((sum, item) => sum + item.fit_score, 0) / Math.max(1, scoredViews.length);
    const diffScore = scoredViews.reduce((sum, item) => sum + item.diff_score, 0) / Math.max(1, scoredViews.length);
    return {
      enabled: true,
      metric: command.browser_score && command.browser_score.metric || "runtime_laya_canvas_mae",
      fit_score: fitScore,
      score: fitScore,
      diff_score: diffScore,
      renderer: {
        mode: runtime.mode,
        scene_url: sceneUrl,
        project_root: projectRoot,
      },
      views: scoredViews,
      summary: { fit_score: fitScore, diff_score: diffScore },
    };
  }

  async function pollOnce() {
    if (busy) return;
    const response = await fetch(`${serverBaseUrl}/material-fit/capture-command?last_nonce=${encodeURIComponent(lastNonce)}`);
    if (!response.ok) return;
    const command = await response.json();
    if (!command || command.enabled === false || !command.nonce || command.nonce === lastNonce) return;
    busy = true;
    try {
      lastNonce = command.nonce;
      const browserScore = await renderAndScore(command);
      await fetch(`${serverBaseUrl}/material-fit/capture-score`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nonce: command.nonce, browser_score: browserScore }),
      });
    } catch (error) {
      await fetch(`${serverBaseUrl}/material-fit/capture-log`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ level: "error", message: String(error && error.stack || error) }),
      }).catch(() => {});
    } finally {
      busy = false;
    }
  }

  window.__MATERIAL_FIT_READY__ = true;
  window.__MATERIAL_FIT_RENDERER__ = {
    mode: runtime.mode,
    sceneUrl,
    projectRoot,
    targetName: runtime.target && runtime.target.name,
    cameraName: runtime.camera && runtime.camera.name,
  };
  setInterval(() => { pollOnce().catch(() => {}); }, 50);
})();
</script>
</body>
</html>
